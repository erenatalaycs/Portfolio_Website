# .github/workflows/deploy.yml
# Source: 01-RESEARCH.md Pattern 11; 01-CONTEXT.md D-15, D-16, D-17
# Deploys the static Vite bundle to GitHub Pages on every push to main.
# Action versions verified live 2026-05-06.

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment; do not cancel an in-progress run.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Phase 1 CI gates — all blocking, all run BEFORE build (D-16).
      - name: TypeScript typecheck
        run: npx tsc --noEmit

      - name: ESLint (warnings are errors)
        run: npx eslint . --max-warnings=0

      - name: Prettier check
        run: npx prettier --check .

      # Phase 1 test surface (Plan 03's lib tests). Empty until Plan 03 lands;
      # vitest run on no test files exits 0, so this is safe in Wave 2.
      - name: Vitest (utility tests)
        run: npm test

      # OPSEC gate (D-17 / OPS-01) — strip + verify metadata in public/assets/.
      - name: Install exiftool
        run: |
          sudo apt-get update
          sudo apt-get install -y libimage-exiftool-perl

      - name: Strip metadata from public/assets
        run: |
          # If public/assets/ does not exist yet (Plan 02 ships before Plan 05's
          # CV PDF and Plan 06's og-image.png) the loop is a no-op. Once those
          # plans land the strip becomes meaningful. Build does not fail on an
          # empty directory.
          if [ -d public/assets ] && [ "$(ls -A public/assets 2>/dev/null)" ]; then
            exiftool -all= -P -overwrite_original public/assets/*
          else
            echo "public/assets/ is empty or absent — strip step skipped (will activate once content lands)."
          fi

      - name: Verify no metadata remains (fail build if any present)
        run: |
          # Targeted OPSEC blocklist. Inherent file-format tags (PDFVersion,
          # PageCount, ImageWidth, etc.) are NOT in scope — they're structural,
          # not user-attributable. We fail only on real OPSEC threats:
          #   Author/Creator/Producer (PDF/Office docs identify the author)
          #   Title/Subject/Keywords  (often filled by the authoring app with leaked context)
          #   CreationDate/ModDate    (timeline correlation)
          #   DocumentID/InstanceID   (XMP IDs link documents across uploads)
          #   CreatorTool/Software    (which application produced this)
          #   GPS*                    (location)
          #   ICC_Profile / EXIF / IPTC / XMP — entire groups (camera, location,
          #     descriptive metadata) — these never need to ship for a CV PDF or
          #     a portfolio screenshot.
          if [ -d public/assets ] && [ "$(ls -A public/assets 2>/dev/null)" ]; then
            for f in public/assets/*; do
              [ -f "$f" ] || continue
              offending=$(exiftool -S \
                -Author -Creator -Producer -Title -Subject -Keywords \
                -CreationDate -ModDate -DocumentID -InstanceID \
                -CreatorTool -Software \
                -GPSLatitude -GPSLongitude -GPSPosition -GPSAltitude \
                -EXIF:all -XMP:all -IPTC:all -ICC_Profile:all \
                "$f" 2>/dev/null || true)
              if [ -n "$offending" ]; then
                echo "OPSEC FAIL: $f still contains user-attributable metadata:"
                echo "$offending"
                exit 1
              fi
            done
          else
            echo "public/assets/ is empty or absent — verify step has nothing to check."
          fi

      # TXT-06 / CNT-03 / Pitfall 8 parity audit (Phase 3 D-19).
      # Fails the build BEFORE Vite if a SECTIONS id is unrendered, a skill is
      # provenance-orphan, or a writeup references an unknown ATT&CK id.
      - name: Parity audit (TXT-06)
        run: npm run parity

      - name: Build (Vite)
        run: npm run build
        env:
          VITE_WEB3FORMS_KEY: ${{ vars.VITE_WEB3FORMS_KEY }}

      # Phase 2 OPS-02: enforce three byte budgets via size-limit.
      # The config lives in package.json's "size-limit" field. This step
      # exit-fails if any non-ignored entry exceeds its limit:
      #   text shell entry: 120 KB gz
      #   3D lazy chunk:    450 KB gz
      #   GLB workstation:  2500 KB raw (48 B placeholder until Phase 4)
      # Source: 02-RESEARCH.md Pattern 9 (size-limit Configuration)
      - name: Enforce bundle size budgets
        run: npx size-limit

      # Phase 4 OPS-05 — operational launch gates (Plan 04-07).
      # Five new BLOCKING gates that audit dist/ BEFORE upload-pages-artifact.
      # Source: 04-RESEARCH.md Pattern 19 + Pattern 20; 04-CONTEXT.md D-14.

      - name: 'Dev-helper strip (no <Stats>, <Perf>, leva, r3f-perf in dist; project console.log gated to entry chunk)'
        run: |
          # Source: 04-RESEARCH.md Pattern 19 + Pattern 20.
          # Fail if any dev helper leaks into the production bundle UNLESS
          # explicitly tagged `// dev-only` (manual exception marker).
          # console.warn / console.error are KEPT (acceptable error reporting).
          #
          # Project-specific dev helpers (<Stats>, <Perf>, leva, r3f-perf):
          # scan ALL chunks. These names are unique to project dev tooling.
          if grep -rE '(<Stats|<Perf|leva|r3f-perf)' dist/assets/ 2>/dev/null \
              | grep -v '// dev-only' \
              | grep -v '^Binary file'; then
            echo 'OPS-05 FAIL: project dev helper(s) leaked into dist/. Gate behind import.meta.env.DEV.'
            exit 1
          fi
          # Generic console.log / console.debug: only audit the ENTRY chunk
          # (dist/assets/index-*.js — our first-party code surface).
          # Lazy-loaded chunks (ThreeDShell, PostFX, vendor) include
          # third-party libraries (three.js DRACOLoader, drei, postprocessing)
          # that legitimately use console.log/debug internally; we can't strip
          # those without forking. Our own console.log uses are gated behind
          # `import.meta.env.DEV` (see src/ui/ContactForm.tsx + src/lib/web3forms.ts).
          if grep -E '(console\.log|console\.debug)' dist/assets/index-*.js 2>/dev/null \
              | grep -v '// dev-only'; then
            echo 'OPS-05 FAIL: console.log/console.debug in entry chunk. Gate behind import.meta.env.DEV.'
            exit 1
          fi
          echo 'Dev-helper strip: OK.'

      - name: 'External-link audit (every target="_blank" carries rel="noopener noreferrer")'
        run: |
          # Source: 04-RESEARCH.md Pattern 19. CHECKLIST-OPSEC § External Links.
          # OPS-05 explicit. Phase 1 BracketLink already auto-attaches rel for
          # external links; this gate verifies no hand-rolled <a target="_blank">
          # slipped past either at SSR-string-build time (index.html) or as an
          # inlined string in the JS bundle.
          offenders=$(grep -E 'target="_blank"' dist/index.html | grep -v 'rel="noopener noreferrer"' || true)
          if [ -n "$offenders" ]; then
            echo 'OPS-05 FAIL: target="_blank" in dist/index.html without rel="noopener noreferrer":'
            echo "$offenders"
            exit 1
          fi
          # Also audit the bundled JS — match both unescaped and JS-string-escaped forms.
          if grep -rE 'target=\\?"_blank\\?"' dist/assets/ 2>/dev/null \
              | grep -v 'rel=\\?"noopener noreferrer\\?"' \
              | grep -v '^Binary file'; then
            echo 'OPS-05 FAIL: target="_blank" in dist/assets/ without rel.'
            exit 1
          fi
          echo 'External-link audit: OK.'

      - name: 'CSP connect-src includes api.web3forms.com (Pitfall 3)'
        run: |
          # Source: 04-RESEARCH.md Pitfall 3. Plan 04-02 extended the CSP
          # <meta http-equiv="Content-Security-Policy"> with the Web3Forms
          # endpoint; this gate verifies the extension survives every build.
          # Without it, ContactForm submit is blocked silently by the browser
          # in production and Eren only finds out via missing inbox messages.
          if ! grep -F 'connect-src' dist/index.html | grep -F 'https://api.web3forms.com' >/dev/null; then
            echo 'OPS-05 FAIL: dist/index.html CSP <meta> does not allow Web3Forms in connect-src.'
            echo 'ContactForm submit will be blocked silently in production.'
            exit 1
          fi
          echo 'CSP connect-src: OK.'

      - name: 'JSON-LD email-omission audit (Pitfall 4)'
        run: |
          # Source: 04-RESEARCH.md Pattern 20; Phase 1 D-09 + STATE.md
          # `[Phase 1] Plan 01-06: JSON-LD Person omits email field`.
          # This gate verifies the omission survives every build. A plain-email
          # leak via JSON-LD defeats the rot13+base64 obfuscation in
          # src/lib/obfuscate.ts — a scraper just reads the schema.
          if ! grep -F 'application/ld+json' dist/index.html >/dev/null; then
            echo 'OPS-05 FAIL: dist/index.html missing JSON-LD <script> entirely.'
            exit 1
          fi
          if sed -n '/application\/ld+json/,/<\/script>/p' dist/index.html | grep -E '"email"[[:space:]]*:' >/dev/null; then
            echo 'OPS-05 FAIL: JSON-LD includes "email" field (Pitfall 4 information disclosure).'
            exit 1
          fi
          echo 'JSON-LD email-omission: OK.'

      - name: 'npm audit --production (no high/critical advisories)'
        run: |
          # Source: 04-RESEARCH.md Pattern 19. Production deps only;
          # dev deps are not part of the shipped bundle. --audit-level=high
          # fails on high+critical only (moderate/low warnings allowed per
          # threat-register T-04-07-07: a transitive low CVE that has no patch
          # should not block deploy — accept and escalate as a deviation).
          npm audit --production --audit-level=high

      - name: Copy index.html → 404.html (SPA fallback for GH Pages deep links)
        run: cp dist/index.html dist/404.html

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  lighthouse:
    # Source: 04-CONTEXT.md D-17; 04-RESEARCH.md Pattern 13 + Pattern 15 +
    #   Pitfall 8. ADVISORY only — manual median-of-3 in Plan 04-08 is the
    #   OPS-03 sign-off source of truth. continue-on-error: true keeps the
    #   workflow green even if scores drop below the lighthouserc.json
    #   thresholds, so a deploy is never blocked by an advisory regression.
    needs: deploy
    runs-on: ubuntu-latest
    if: ${{ success() }}
    continue-on-error: true
    steps:
      - name: Checkout (for lighthouserc.json)
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Wait for GH Pages CDN propagation + warm cache (Pitfall 8)
        run: |
          # Sleep gives the actions/deploy-pages@v5 invalidation time to
          # propagate across the Pages CDN edges. Without this, the first
          # Lighthouse run frequently captures a 404 or stale cache hit
          # and the score is meaningless.
          sleep 60
          # Warm CDN cache to make first lighthouse run representative
          # (RESEARCH Pitfall 8). Failures here are non-fatal — Lighthouse
          # itself will report any persistent fetch issue.
          curl -s -o /dev/null https://eren-atalay.github.io/Portfolio_Website/ || true
          curl -s -o /dev/null 'https://eren-atalay.github.io/Portfolio_Website/?view=text' || true
          curl -s -o /dev/null 'https://eren-atalay.github.io/Portfolio_Website/?view=3d' || true
          sleep 5

      - name: Run Lighthouse-CI (advisory)
        run: npx -y @lhci/cli@~0.15.1 autorun
