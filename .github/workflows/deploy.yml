# .github/workflows/deploy.yml
# Source: 01-RESEARCH.md Pattern 11; 01-CONTEXT.md D-15, D-16, D-17
# Deploys the static Vite bundle to GitHub Pages on every push to main.
# Action versions verified live 2026-05-06.

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment; do not cancel an in-progress run.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Phase 1 CI gates — all blocking, all run BEFORE build (D-16).
      - name: TypeScript typecheck
        run: npx tsc --noEmit

      - name: ESLint (warnings are errors)
        run: npx eslint . --max-warnings=0

      - name: Prettier check
        run: npx prettier --check .

      # Phase 1 test surface (Plan 03's lib tests). Empty until Plan 03 lands;
      # vitest run on no test files exits 0, so this is safe in Wave 2.
      - name: Vitest (utility tests)
        run: npm test

      # OPSEC gate (D-17 / OPS-01) — strip + verify metadata in public/assets/.
      - name: Install exiftool
        run: |
          sudo apt-get update
          sudo apt-get install -y libimage-exiftool-perl

      - name: Strip metadata from public/assets
        run: |
          # If public/assets/ does not exist yet (Plan 02 ships before Plan 05's
          # CV PDF and Plan 06's og-image.png) the loop is a no-op. Once those
          # plans land the strip becomes meaningful. Build does not fail on an
          # empty directory.
          if [ -d public/assets ] && [ "$(ls -A public/assets 2>/dev/null)" ]; then
            exiftool -all= -P -overwrite_original public/assets/*
          else
            echo "public/assets/ is empty or absent — strip step skipped (will activate once content lands)."
          fi

      - name: Verify no metadata remains (fail build if any present)
        run: |
          # Targeted OPSEC blocklist. Inherent file-format tags (PDFVersion,
          # PageCount, ImageWidth, etc.) are NOT in scope — they're structural,
          # not user-attributable. We fail only on real OPSEC threats:
          #   Author/Creator/Producer (PDF/Office docs identify the author)
          #   Title/Subject/Keywords  (often filled by the authoring app with leaked context)
          #   CreationDate/ModDate    (timeline correlation)
          #   DocumentID/InstanceID   (XMP IDs link documents across uploads)
          #   CreatorTool/Software    (which application produced this)
          #   GPS*                    (location)
          #   ICC_Profile / EXIF / IPTC / XMP — entire groups (camera, location,
          #     descriptive metadata) — these never need to ship for a CV PDF or
          #     a portfolio screenshot.
          if [ -d public/assets ] && [ "$(ls -A public/assets 2>/dev/null)" ]; then
            for f in public/assets/*; do
              [ -f "$f" ] || continue
              offending=$(exiftool -S \
                -Author -Creator -Producer -Title -Subject -Keywords \
                -CreationDate -ModDate -DocumentID -InstanceID \
                -CreatorTool -Software \
                -GPSLatitude -GPSLongitude -GPSPosition -GPSAltitude \
                -EXIF:all -XMP:all -IPTC:all -ICC_Profile:all \
                "$f" 2>/dev/null || true)
              if [ -n "$offending" ]; then
                echo "OPSEC FAIL: $f still contains user-attributable metadata:"
                echo "$offending"
                exit 1
              fi
            done
          else
            echo "public/assets/ is empty or absent — verify step has nothing to check."
          fi

      # TXT-06 / CNT-03 / Pitfall 8 parity audit (Phase 3 D-19).
      # Fails the build BEFORE Vite if a SECTIONS id is unrendered, a skill is
      # provenance-orphan, or a writeup references an unknown ATT&CK id.
      - name: Parity audit (TXT-06)
        run: npm run parity

      - name: Build (Vite)
        run: npm run build

      # Phase 2 OPS-02: enforce three byte budgets via size-limit.
      # The config lives in package.json's "size-limit" field. This step
      # exit-fails if any non-ignored entry exceeds its limit:
      #   text shell entry: 120 KB gz
      #   3D lazy chunk:    450 KB gz
      #   GLB workstation:  2500 KB raw (48 B placeholder until Phase 4)
      # Source: 02-RESEARCH.md Pattern 9 (size-limit Configuration)
      - name: Enforce bundle size budgets
        run: npx size-limit

      - name: Copy index.html → 404.html (SPA fallback for GH Pages deep links)
        run: cp dist/index.html dist/404.html

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
