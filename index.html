<!doctype html>
<html lang="en" class="motion-safe:scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Favicons + manifest -->
    <link rel="icon" type="image/svg+xml" href="/Portfolio_Website/favicon.svg" />
    <link
      rel="alternate icon"
      type="image/png"
      sizes="32x32"
      href="/Portfolio_Website/favicon-32.png"
    />
    <link rel="manifest" href="/Portfolio_Website/manifest.webmanifest" />

    <!-- Theme + color scheme -->
    <meta name="theme-color" content="#0d1117" />
    <meta name="color-scheme" content="dark" />

    <!-- Title + description -->
    <title>Eren Atalay — Junior Cybersecurity Analyst</title>
    <meta
      name="description"
      content="Eren Atalay — Junior Cybersecurity Analyst (UK). CV, projects, certifications, and home-lab write-ups."
    />

    <!-- Canonical URL -->
    <link rel="canonical" href="https://erenatalaycs.github.io/Portfolio_Website/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Eren Atalay — Junior Cybersecurity Analyst" />
    <meta
      property="og:description"
      content="CV, projects, certifications, and home-lab write-ups."
    />
    <meta property="og:url" content="https://erenatalaycs.github.io/Portfolio_Website/" />
    <meta
      property="og:image"
      content="https://erenatalaycs.github.io/Portfolio_Website/assets/og-image.png"
    />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Eren Atalay — Junior Cybersecurity Analyst" />
    <meta
      name="twitter:description"
      content="CV, projects, certifications, and home-lab write-ups."
    />
    <meta
      name="twitter:image"
      content="https://erenatalaycs.github.io/Portfolio_Website/assets/og-image.png"
    />

    <!-- Permissive baseline CSP — Phase 4 tightens with hashes/nonces. -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'none';"
    />

    <!-- JSON-LD Person schema. Email is INTENTIONALLY OMITTED — including it
         would defeat the rot13+base64 obfuscation in src/lib/obfuscate.ts.
         See 01-RESEARCH.md Pitfall 4. -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Person",
        "name": "Eren Atalay",
        "jobTitle": "Junior Cybersecurity Analyst",
        "url": "https://erenatalaycs.github.io/Portfolio_Website/",
        "homeLocation": {
          "@type": "Place",
          "name": "United Kingdom"
        },
        "sameAs": ["https://github.com/erenatalaycs", "https://www.linkedin.com/in/handle-pending"],
        "image": "https://erenatalaycs.github.io/Portfolio_Website/assets/og-image.png"
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/app/main.tsx"></script>
  </body>
</html>
